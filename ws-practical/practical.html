<?php
function factorial($n)
{
 if($n == 0 || $n == 1)
 return 1;
 else
 return $n * factorial($n - 1); // Recursive function
}
$number = $_POST['num'];
$result = factorial($number);
echo "<h2>Factorial Result</h2>";
echo "Number: " . $number . "<br><br>";
echo "Factorial: " . $result;
?>
